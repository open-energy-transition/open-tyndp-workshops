[workspace]
name = "open-tyndp-workshops"
version = "0.1.0"
description = "Open TYNDP Workshops – Jupyter Book"
authors = ["Contributors to Open-TYNDP"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tasks]
build-book = "jupyter-book build open-tyndp-workshops"
clean-book = "jupyter-book clean open-tyndp-workshops"
rebuild-book = { depends-on = ["clean-book", "build-book"] }

# ── conda dependencies ────────────────────────────────────────────────────────

[dependencies]
python = ">=3.12"
pip = "*"
setuptools = "*"

# main packages
numpy = "*"
scipy = "*"
pandas = ">=2,<3"
geopandas = ">=1"
snakemake-minimal = ">=9"
snakemake-storage-plugin-http = ">=0.3"
xarray = ">=2024.3.0,<2025.7.0"
networkx = "*"
yaml = "*"
pyomo = "*"
netcdf4 = "*"
pypsa = ">=0.35.2"
atlite = ">=0.2.14"
powerplantmatching = ">=0.6"
rasterio = ">=1.3.2,<1.4"
pysheds = "*"
pyarrow = "*"
numba = "*"
highspy = "*"
google-cloud-storage = ">=2.0"

# interactive python
ipython = "*"
jupyterlab = "*"

# reading particular file types
tabula-py = "*"
xlrd = "*"
lxml = "*"
pytables = "*"
pyxlsb = "*"
openpyxl = "*"
libgdal-hdf5 = "*"
libgdal-netcdf = "*"
pdf2image = "*"
numexpr = "*"
pyyaml = "*"

# geodata utilities
shapely = ">=2"
pyepsg = "*"
cartopy = ">=0.22"
country_converter = "*"
mapclassify = "*"

# plotting
matplotlib = ">=3.6"
plotly = "*"
hvplot = "*"
holoviews = "*"
geoviews = ">=1.10"
graphviz = "*"
fiona = "*"
folium = "*"

# publishing & dev tooling
jupyter-book = "<2.0.0"
ghp-import = "*"
pre-commit = "*"

# ── PyPI-only dependencies ────────────────────────────────────────────────────

[pypi-dependencies]
pypsa-explorer = "*"
