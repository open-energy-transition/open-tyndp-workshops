name: deploy PR previews

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    - closed

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-preview-book:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v5

    # Install dependencies
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        activate-environment: open-tyndp-workshops
        channel-priority: strict

    - name: Cache Conda env
      uses: actions/cache@v4
      with:
        path: ${{ env.CONDA }}/envs
        key: conda-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles(format('{0}', env.env_file)) }}
      id: cache-env

    - name: Update environment
      run: |
        conda env update -n open-tyndp-workshops -f environment.yaml
        echo "Run conda list" && conda list

    - name: Install pixi
      run: |
        curl -fsSL https://pixi.sh/install.sh | sh
        echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.pixi/bin:$PATH"
        pixi --version

    # Build the book
    - name: Build the book
      run: |
        jupyter-book build open-tyndp-workshops

    # Deploy the preview
    - name: Deploy preview
      uses: rossjrw/pr-preview-action@v1
      with:
        source-dir: open-tyndp-workshops/_build/html
